<!DOCTYPE html>
<html lang="pl" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Lifetime Monitor{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary px-4">
  <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
    <span class="badge bg-success rounded-circle p-2"><i class="bi bi-activity"></i></span>
    Lifetime Monitor
  </a>
  <div class="ms-auto d-flex align-items-center gap-3">
    <span class="text-secondary small" id="last-update">Sprawdzanie co 2 min</span>
    <button class="btn btn-outline-success btn-sm" onclick="checkNow()">
      <i class="bi bi-arrow-clockwise"></i> Sprawdź teraz
    </button>
  </div>
</nav>

<div class="container-xl py-4">
  {% block content %}{% endblock %}
</div>

<footer class="text-center text-secondary py-4 border-top border-secondary mt-4 small">
  Lifetime Monitor &mdash; Mini klon Downdetectora &bull; Odświeżanie co 2 minuty
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script>
async function checkNow() {
  const btn = document.querySelector('[onclick="checkNow()"]');
  btn.disabled = true;
  btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Sprawdzam…';
  await fetch('/api/check_now', {method:'POST'});
  setTimeout(() => location.reload(), 1500);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
